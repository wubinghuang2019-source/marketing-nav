<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>营销导航网 - 营销人必备工具导航</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      color: white;
      padding: 40px 20px;
    }

    header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    header p {
      font-size: 1.1em;
      opacity: 0.9;
    }

    /* 搜索框 */
    .search-box {
      max-width: 600px;
      margin: 30px auto;
      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: 15px 50px 15px 25px;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      outline: none;
      transition: all 0.3s;
    }

    .search-box input:focus {
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
      transform: translateY(-2px);
    }

    .search-box .search-icon {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 20px;
      color: #999;
    }

    /* 分类导航 */
    .category-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin: 30px 0;
    }

    .category-btn {
      padding: 10px 20px;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s;
      background: white;
      color: #333;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .category-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    }

    .category-btn.active {
      background: #667eea;
      color: white;
    }

    /* 网站卡片 */
    .sites-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .site-card {
      background: white;
      border-radius: 15px;
      padding: 25px;
      transition: all 0.3s;
      cursor: pointer;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      position: relative;
      overflow: hidden;
    }

    .site-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, var(--category-color), transparent);
    }

    .site-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .site-card a {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .site-header {
      display: flex;
      align-items: center;
      margin-bottom: 15px;
    }

    .site-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      margin-right: 15px;
      flex-shrink: 0;
    }

    .site-name {
      font-size: 18px;
      font-weight: 600;
      color: #333;
      margin-bottom: 3px;
    }

    .site-url {
      font-size: 12px;
      color: #999;
    }

    .site-desc {
      font-size: 14px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 15px;
    }

    .site-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      padding: 4px 12px;
      background: #f5f5f5;
      border-radius: 12px;
      font-size: 12px;
      color: #666;
    }

    /* 分类标题 */
    .category-section {
      margin: 40px 0;
    }

    .category-title {
      font-size: 24px;
      color: white;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .category-title span {
      font-size: 28px;
    }

    /* 页脚 */
    footer {
      text-align: center;
      color: white;
      padding: 40px 20px;
      opacity: 0.8;
    }

    footer a {
      color: white;
      text-decoration: underline;
    }

    /* 响应式 */
    @media (max-width: 768px) {
      header h1 {
        font-size: 1.8em;
      }

      .sites-grid {
        grid-template-columns: 1fr;
      }

      .category-nav {
        overflow-x: auto;
        flex-wrap: nowrap;
        padding-bottom: 10px;
      }

      .category-btn {
        flex-shrink: 0;
      }
    }

    /* 隐藏类 */
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🎯 营销导航网</h1>
      <p>营销人必备工具导航 · 持续更新中</p>
    </header>

    <!-- 搜索框 -->
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜索工具、网站、关键词..." oninput="handleSearch()">
      <span class="search-icon">🔍</span>
    </div>

    <!-- 分类导航 -->
    <div class="category-nav" id="categoryNav"></div>

    <!-- 网站列表 -->
    <div id="sitesContainer"></div>

    <footer>
      <p>💡 有好工具推荐？欢迎反馈</p>
      <p>最后更新：<span id="updateDate"></span></p>
    </footer>
  </div>

  <script>
    let sitesData = null;
    let activeCategory = 'all';

    // 加载数据
    async function loadData() {
      try {
        const response = await fetch('sites.json');
        sitesData = await response.json();
        renderCategoryNav();
        renderSites();
        document.getElementById('updateDate').textContent = sitesData.meta.updatedAt;
      } catch (error) {
        console.error('加载数据失败:', error);
        document.getElementById('sitesContainer').innerHTML = 
          '<p style="text-align:center;color:white;">加载失败，请刷新页面重试</p>';
      }
    }

    // 渲染分类导航
    function renderCategoryNav() {
      const nav = document.getElementById('categoryNav');
      nav.innerHTML = `
        <button class="category-btn active" data-category="all" onclick="filterCategory('all')">
          全部
        </button>
        ${sitesData.categories.map(cat => `
          <button class="category-btn" data-category="${cat.id}" onclick="filterCategory('${cat.id}')" style="--category-color: ${cat.color}">
            ${cat.icon} ${cat.name}
          </button>
        `).join('')}
      `;
    }

    // 渲染网站列表
    function renderSites(filterText = '') {
      const container = document.getElementById('sitesContainer');
      
      if (activeCategory === 'all') {
        // 显示所有分类
        container.innerHTML = sitesData.categories.map(cat => 
          renderCategorySection(cat, filterText)
        ).join('');
      } else {
        // 只显示选中分类
        const cat = sitesData.categories.find(c => c.id === activeCategory);
        if (cat) {
          container.innerHTML = renderCategorySection(cat, filterText);
        }
      }
    }

    // 渲染单个分类
    function renderCategorySection(cat, filterText = '') {
      const filteredSites = cat.sites.filter(site => {
        if (!filterText) return true;
        const text = (site.name + site.desc + site.tags.join(' ')).toLowerCase();
        return text.includes(filterText.toLowerCase());
      });

      if (filteredSites.length === 0) return '';

      return `
        <div class="category-section">
          <h2 class="category-title" style="--category-color: ${cat.color}">
            <span>${cat.icon}</span> ${cat.name}
          </h2>
          <div class="sites-grid">
            ${filteredSites.map(site => renderSiteCard(site, cat.color)).join('')}
          </div>
        </div>
      `;
    }

    // 渲染单个网站卡片
    function renderSiteCard(site, categoryColor) {
      const siteIcon = site.url !== '#' 
        ? `<img src="https://www.google.com/s2/favicons?domain=${site.url}&sz=64" alt="" onerror="this.style.display='none';this.parentElement.textContent='🔗'">`
        : '🔗';

      return `
        <div class="site-card" style="--category-color: ${categoryColor}" onclick="openSite('${site.url}')">
          <a href="${site.url}" target="_blank">
            <div class="site-header">
              <div class="site-icon">${siteIcon}</div>
              <div>
                <div class="site-name">${site.name}</div>
                <div class="site-url">${new URL(site.url !== '#' ? site.url : 'https://example.com').hostname}</div>
              </div>
            </div>
            <div class="site-desc">${site.desc}</div>
            <div class="site-tags">
              ${site.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
            </div>
          </a>
        </div>
      `;
    }

    // 打开网站
    function openSite(url) {
      if (url !== '#') {
        window.open(url, '_blank');
      }
    }

    // 分类筛选
    function filterCategory(categoryId) {
      activeCategory = categoryId;
      
      // 更新按钮状态
      document.querySelectorAll('.category-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.category === categoryId);
      });

      renderSites();
    }

    // 搜索处理
    function handleSearch() {
      const searchText = document.getElementById('searchInput').value;
      
      if (searchText) {
        // 搜索时显示所有分类的结果
        const container = document.getElementById('sitesContainer');
        container.innerHTML = sitesData.categories
          .map(cat => renderCategorySection(cat, searchText))
          .filter(html => html)
          .join('');
      } else {
        renderSites();
      }
    }

    // 初始化
    loadData();
  </script>
</body>
</html>
